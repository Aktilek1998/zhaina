<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адал азамат | Қауіпсіздік ережесі</title>
    <style>
        /* === Жалпы стильдер (дәл алдыңғы сайттардан) === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f0f9ff 0%, #f5f0ff 100%);
            font-family: 'Segoe UI', 'Arial', system-ui, sans-serif;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Химиялық декор */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, rgba(180, 220, 255, 0.2) 0px, rgba(180, 220, 255, 0.2) 2px, transparent 2px, transparent 8px),
                radial-gradient(circle at 70% 20%, rgba(255, 200, 150, 0.15) 0%, transparent 30%),
                radial-gradient(circle at 20% 80%, rgba(200, 150, 255, 0.15) 0%, transparent 35%);
            pointer-events: none;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            border-radius: 60px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.8);
            border: 2px solid white;
            margin: 20px 0;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            color: #2d3e50;
            text-shadow: 0 0 10px #ffaa66, 0 0 20px #66ccff, 2px 2px 0 #ff99aa, -2px -2px 0 #aaff99;
            margin-bottom: 30px;
        }

        /* Карточка (біреу) */
        .card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(2px);
            border-radius: 50px 30px 50px 30px;
            border: 3px solid white;
            padding: 25px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.8), inset 0 0 15px white;
            transition: 0.2s;
            max-width: 800px;
            margin: 0 auto;
        }

        .card:hover {
            transform: scale(1.01);
            box-shadow: 0 0 40px #ffffaa;
        }

        .card h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #335;
            text-shadow: 0 0 5px #ffdd99;
            text-align: center;
            margin-bottom: 20px;
        }

        /* Google Drive iframe стилі */
        .drive-frame {
            width: 100%;
            aspect-ratio: 640 / 480;  /* берілген өлшем бойынша 4:3 */
            border-radius: 30px 20px 30px 20px;
            border: 3px solid white;
            box-shadow: 0 0 25px rgba(255, 240, 200, 0.8);
            background: #e8e0ff;
        }

        /* Адаптация */
        @media (max-width: 700px) {
            .title { font-size: 1.8rem; }
            .card h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Қауіпсіздік ережесі</div>
        <div class="card">
            <h2>Қауіпсіздік ережесі (Google Drive)</h2>
            <!-- Берілген embed коды (ені/биіктігі алынып, стиль арқылы икемді етілді) -->
            <iframe class="drive-frame" src="https://drive.google.com/file/d/1IGOn25NTGlzfgpC8HlI3W3hLOz9G-R_X/preview" allow="autoplay" allowfullscreen></iframe>
            <p style="text-align: center; margin-top: 15px; color: #2d3e50; background: rgba(255,255,255,0.6); padding: 8px; border-radius: 40px;">Қауіпсіздік ережесі — толық нұсқа</p>
        </div>
    </div>
</body>
</html>
