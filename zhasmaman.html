<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адал азамат | Жас мамандармен жұмыс</title>
    <style>
        /* === Жалпы стильдер (дәл алдыңғы сайттардан) === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f0f9ff 0%, #f5f0ff 100%);
            font-family: 'Segoe UI', 'Arial', system-ui, sans-serif;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
        }

        /* Химиялық декор */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, rgba(180, 220, 255, 0.2) 0px, rgba(180, 220, 255, 0.2) 2px, transparent 2px, transparent 8px),
                radial-gradient(circle at 70% 20%, rgba(255, 200, 150, 0.15) 0%, transparent 30%),
                radial-gradient(circle at 20% 80%, rgba(200, 150, 255, 0.15) 0%, transparent 35%);
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            border-radius: 60px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.8);
            border: 2px solid white;
            margin: 20px 0;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            color: #2d3e50;
            text-shadow: 0 0 10px #ffaa66, 0 0 20px #66ccff, 2px 2px 0 #ff99aa, -2px -2px 0 #aaff99;
            margin-bottom: 30px;
        }

        /* Блоктар (үш карточка) */
        .blocks {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .card {
            flex: 1 1 280px;
            max-width: 350px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(2px);
            border-radius: 50px 30px 50px 30px;
            border: 3px solid white;
            padding: 20px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.8), inset 0 0 15px white;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px #ffffaa;
        }

        /* Суреттер стилі */
        .card img {
            width: 100%;
            height: auto;
            border-radius: 40px 20px 40px 20px;
            border: 3px solid white;
            box-shadow: 0 0 20px rgba(255, 255, 200, 0.8);
            background: #f0e8ff; /* фон, егер сурет жүктелмесе */
            object-fit: cover;
            aspect-ratio: 4/3; /* біркелкі пішін */
        }

        .card p {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #2d3e50;
            text-shadow: 0 0 5px #ffeedd;
            background: rgba(255, 255, 255, 0.4);
            padding: 8px 15px;
            border-radius: 40px;
            border: 1px solid white;
            width: fit-content;
        }

        /* Адаптация */
        @media (max-width: 700px) {
            .title { font-size: 1.8rem; }
            .card p { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Жас мамандармен жұмыс</div>
        <div class="blocks">
            <!-- Бірінші фото -->
            <div class="card">
                <img src="img/zhas1.jpeg" alt="Жас маман 1" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22400%22%20height%3D%22300%22%20viewBox%3D%220%200%20400%20300%22%3E%3Crect%20width%3D%22400%22%20height%3D%22300%22%20fill%3D%22%23dcd0ff%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20font-size%3D%2220%22%20fill%3D%22%23442266%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%3Eimg/zhas1.jpg%3C%2Ftext%3E%3C%2Fsvg%3E';">
                <p></p>
            </div>
            <!-- Екінші фото -->
            <div class="card">
                <img src="img/zhas2.jpeg" alt="Жас маман 2" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22400%22%20height%3D%22300%22%20viewBox%3D%220%200%20400%20300%22%3E%3Crect%20width%3D%22400%22%20height%3D%22300%22%20fill%3D%22%23dcd0ff%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20font-size%3D%2220%22%20fill%3D%22%23442266%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%3Eimg/zhas2.jpg%3C%2Ftext%3E%3C%2Fsvg%3E';">
                <p></p>
            </div>
            <!-- Үшінші фото -->
            <div class="card">
                <img src="img/zhas3.jpeg" alt="Жас маман 3" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22400%22%20height%3D%22300%22%20viewBox%3D%220%200%20400%20300%22%3E%3Crect%20width%3D%22400%22%20height%3D%22300%22%20fill%3D%22%23dcd0ff%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20font-size%3D%2220%22%20fill%3D%22%23442266%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%3Eimg/zhas3.jpg%3C%2Ftext%3E%3C%2Fsvg%3E';">
                <p></p>
            </div>
        </div>
        <!-- Қосымша ақпарат (міндетті емес) -->
        <div style="text-align: center; color: #2d3e50; background: rgba(255,255,240,0.6); padding: 12px; border-radius: 50px; border: 2px solid white; margin-top: 20px;">
            Жас мамандар – болашақтың іргетасы
        </div>
    </div>
</body>
</html>
