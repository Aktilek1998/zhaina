<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адал азамат | Жас мамандармен жұмыс</title>
    <style>
        /* === Жалпы стильдер (дәл алдыңғы сайттардан) === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f0f9ff 0%, #f5f0ff 100%);
            font-family: 'Segoe UI', 'Arial', system-ui, sans-serif;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
        }

        /* Химиялық декор */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, rgba(180, 220, 255, 0.2) 0px, rgba(180, 220, 255, 0.2) 2px, transparent 2px, transparent 8px),
                radial-gradient(circle at 70% 20%, rgba(255, 200, 150, 0.15) 0%, transparent 30%),
                radial-gradient(circle at 20% 80%, rgba(200, 150, 255, 0.15) 0%, transparent 35%);
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            border-radius: 60px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.8);
            border: 2px solid white;
            margin: 20px 0;
            position: relative;
            z-index: 1;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            color: #2d3e50;
            text-shadow: 0 0 10px #ffaa66, 0 0 20px #66ccff, 2px 2px 0 #ff99aa, -2px -2px 0 #aaff99;
            margin-bottom: 30px;
        }

        /* Блоктар (алты карточка) */
        .blocks {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .card {
            flex: 1 1 280px;
            max-width: 350px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(2px);
            border-radius: 50px 30px 50px 30px;
            border: 3px solid white;
            padding: 20px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.8), inset 0 0 15px white;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px #ffffaa;
        }

        /* Суреттер стилі */
        .card img {
            width: 100%;
            height: auto;
            border-radius: 40px 20px 40px 20px;
            border: 3px solid white;
            box-shadow: 0 0 20px rgba(255, 255, 200, 0.8);
            background: #f0e8ff; /* фон, егер сурет жүктелмесе */
            object-fit: cover;
            aspect-ratio: 4/3; /* біркелкі пішін */
            transition: all 0.2s ease;
            cursor: pointer; /* суретті басуға болатынын көрсету */
        }

        .card img:hover {
            filter: brightness(1.02) contrast(1.02);
        }

        .card p {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #2d3e50;
            text-shadow: 0 0 5px #ffeedd;
            background: rgba(255, 255, 255, 0.4);
            padding: 8px 15px;
            border-radius: 40px;
            border: 1px solid white;
            width: fit-content;
            text-align: center;
        }

        /* Қосымша ақпарат */
        .footer-note {
            text-align: center;
            color: #2d3e50;
            background: rgba(255, 255, 240, 0.6);
            padding: 12px;
            border-radius: 50px;
            border: 2px solid white;
            margin-top: 20px;
            font-weight: 500;
            backdrop-filter: blur(2px);
        }

        /* === Модальды терезе (суретті үлкейту) === */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border: 5px solid white;
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(255, 255, 200, 0.8);
            background: #f0e8ff; /* фон для заглушек */
        }

        .modal-close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            border: 2px solid white;
        }

        .modal-close:hover {
            background: rgba(255, 100, 100, 0.8);
            transform: scale(1.1);
        }

        /* Адаптация */
        @media (max-width: 700px) {
            .title { font-size: 1.8rem; }
            .card p { font-size: 1rem; }
            .modal-close {
                top: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Жас мамандармен жұмыс</div>
        <div class="blocks">
            <!-- 1-карточка -->
            <div class="card">
                <img src="img/zhas1.jpeg" 
                     alt="Жас мамандар семинарда" 
                     onclick="openModal(this)"
                     onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22400%22%20height%3D%22300%22%20viewBox%3D%220%200%20400%20300%22%3E%3Crect%20width%3D%22400%22%20height%3D%22300%22%20fill%3D%22%23b3a0d9%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20font-size%3D%2222%22%20fill%3D%22%23ffffff%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%20font-weight%3D%22bold%22%3E✨%20Тренинг%3C%2Ftext%3E%3C%2Fsvg%3E';">
                <p>📚 Кәсіби даму тренингі</p>
            </div>
            <!-- 2-карточка -->
            <div class="card">
                <img src="img/zhas2.jpeg" 
                     alt="Тәжірибе алмасу кездесуі" 
                     onclick="openModal(this)"
                     onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22400%22%20height%3D%22300%22%20viewBox%3D%220%200%20400%20300%22%3E%3Crect%20width%3D%22400%22%20height%3D%22300%22%20fill%3D%22%23aac7d9%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20font-size%3D%2222%22%20fill%3D%22%23ffffff%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%20font-weight%3D%22bold%22%3E💬%20Алмасу%3C%2Ftext%3E%3C%2Fsvg%3E';">
                <p>🤝 Тәжірибе алмасу алаңы</p>
            </div>
            <!-- 3-карточка -->
            <div class="card">
                <img src="img/zhas3.jpeg" 
                     alt="Жастар бастамасы" 
                     onclick="openModal(this)"
                     onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22400%22%20height%3D%22300%22%20viewBox%3D%220%200%20400%20300%22%3E%3Crect%20width%3D%22400%22%20height%3D%22300%22%20fill%3D%22%23d9b8a0%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20font-size%3D%2222%22%20fill%3D%22%23ffffff%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%20font-weight%3D%22bold%22%3E🚀%20Бастама%3C%2Ftext%3E%3C%2Fsvg%3E';">
                <p>💡 Жастар инновациясы</p>
            </div>
            <!-- 4-карточка (жаңа) -->
            <div class="card">
                <img src="img/zhas4.jpeg" 
                     alt="Жоба қорғау" 
                     onclick="openModal(this)"
                     onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22400%22%20height%3D%22300%22%20viewBox%3D%220%200%20400%20300%22%3E%3Crect%20width%3D%22400%22%20height%3D%22300%22%20fill%3D%22%2390c0a0%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20font-size%3D%2222%22%20fill%3D%22%23ffffff%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%20font-weight%3D%22bold%22%3E📊%20Жоба%3C%2Ftext%3E%3C%2Fsvg%3E';">
                <p>📊 Жоба қорғау</p>
            </div>
            <!-- 5-карточка (жаңа) -->
            <div class="card">
                <img src="img/zhas5.jpeg" 
                     alt="Командалық жұмыс" 
                     onclick="openModal(this)"
                     onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22400%22%20height%3D%22300%22%20viewBox%3D%220%200%20400%20300%22%3E%3Crect%20width%3D%22400%22%20height%3D%22300%22%20fill%3D%22%23c0a0d0%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20font-size%3D%2222%22%20fill%3D%22%23ffffff%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%20font-weight%3D%22bold%22%3E👥%20Команда%3C%2Ftext%3E%3C%2Fsvg%3E';">
                <p>👥 Командалық жұмыс</p>
            </div>
            <!-- 6-карточка (жаңа) -->
            <div class="card">
                <img src="img/zhas6.jpeg" 
                     alt="Тәлімгерлік" 
                     onclick="openModal(this)"
                     onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22400%22%20height%3D%22300%22%20viewBox%3D%220%200%20400%20300%22%3E%3Crect%20width%3D%22400%22%20height%3D%22300%22%20fill%3D%22%23d0b080%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20font-size%3D%2222%22%20fill%3D%22%23ffffff%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%20font-weight%3D%22bold%22%3E🎓%20Тәлімгер%3C%2Ftext%3E%3C%2Fsvg%3E';">
                <p>🎓 Тәлімгерлік бағдарлама</p>
            </div>
        </div>
        <!-- Қосымша ақпарат -->
        <div class="footer-note">
            🌱 Жас мамандар – болашақтың іргетасы. Біз олардың кәсіби өсуіне қолдау көрсетеміз.
        </div>
    </div>

    <!-- Модальды терезе (суретті үлкейту) -->
    <div id="imageModal" class="modal" onclick="closeModalOnClickOutside(event)">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <img id="modalImage" src="" alt="Үлкейтілген сурет">
    </div>

    <script>
        // Модальды терезені ашу функциясы
        function openModal(imgElement) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modal.style.display = 'flex'; // flex орталықтау үшін
            modalImg.src = imgElement.src; // басылған суреттің ағымдағы src
            // қосымша: егер onerror арқылы заглушка болса да сол заглушка үлкейеді
            document.body.style.overflow = 'hidden'; // артқы жолақты айналдыруды болдырмау
        }

        // Модальды терезені жабу функциясы
        function closeModal() {
            const modal = document.getElementById('imageModal');
            modal.style.display = 'none';
            document.body.style.overflow = ''; // айналдыруды қайта қосу
        }

        // Модальды терезенің фонына (overlay) басқанда жабу
        function closeModalOnClickOutside(event) {
            const modal = document.getElementById('imageModal');
            if (event.target === modal) { // егер клик тікелей модаль контейнерінде болса (фоны)
                closeModal();
            }
        }

        // Escape пернесін басқанда модальды жабу
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
